<div class="card shadow">
  <div class="card-body p-4">
    <h5 class="card-title mb-4">Create Account</h5>
    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="mb-3">
        <label class="form-label">Title</label>
        <select formControlName="title" class="form-select"
          [ngClass]="{'is-invalid': submitted && f['title'].errors}">
          <option value="">Select...</option>
          <option>Mr</option>
          <option>Mrs</option>
          <option>Miss</option>
          <option>Ms</option>
        </select>
        <div *ngIf="submitted && f['title'].errors" class="invalid-feedback">Title is required</div>
      </div>
      <div class="row g-2 mb-3">
        <div class="col-6">
          <label class="form-label">First Name</label>
          <input type="text" formControlName="firstName" class="form-control"
            [ngClass]="{'is-invalid': submitted && f['firstName'].errors}" />
          <div *ngIf="submitted && f['firstName'].errors" class="invalid-feedback">Required</div>
        </div>
        <div class="col-6">
          <label class="form-label">Last Name</label>
          <input type="text" formControlName="lastName" class="form-control"
            [ngClass]="{'is-invalid': submitted && f['lastName'].errors}" />
          <div *ngIf="submitted && f['lastName'].errors" class="invalid-feedback">Required</div>
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" formControlName="email" class="form-control"
          [ngClass]="{'is-invalid': submitted && f['email'].errors}" />
        <div *ngIf="submitted && f['email'].errors" class="invalid-feedback">
          <div *ngIf="f['email'].errors['required']">Email is required</div>
          <div *ngIf="f['email'].errors['email']">Enter a valid email</div>
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" formControlName="password" class="form-control"
          [ngClass]="{'is-invalid': submitted && f['password'].errors}" />
        <div *ngIf="submitted && f['password'].errors" class="invalid-feedback">
          <div *ngIf="f['password'].errors['required']">Password is required</div>
          <div *ngIf="f['password'].errors['minlength']">At least 6 characters</div>
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label">Confirm Password</label>
        <input type="password" formControlName="confirmPassword" class="form-control"
          [ngClass]="{'is-invalid': submitted && f['confirmPassword'].errors}" />
        <div *ngIf="submitted && f['confirmPassword'].errors" class="invalid-feedback">
          <div *ngIf="f['confirmPassword'].errors['required']">Confirm password is required</div>
          <div *ngIf="f['confirmPassword'].errors['mustMatch']">Passwords must match</div>
        </div>
      </div>
      <div class="mb-3 form-check">
        <input type="checkbox" formControlName="acceptTerms" id="acceptTerms" class="form-check-input"
          [ngClass]="{'is-invalid': submitted && f['acceptTerms'].errors}" />
        <label class="form-check-label" for="acceptTerms">I accept the terms and conditions</label>
        <div *ngIf="submitted && f['acceptTerms'].errors" class="invalid-feedback">You must accept the terms</div>
      </div>
      <button [disabled]="loading" class="btn btn-primary w-100">
        <span *ngIf="loading" class="spinner-border spinner-border-sm me-1"></span>
        Register
      </button>
    </form>
    <hr>
    <p class="text-center mb-0 small">
      Already have an account? <a routerLink="/account/login">Sign in</a>
    </p>
  </div>
</div>
