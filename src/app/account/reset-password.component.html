<div class="card shadow">
  <div class="card-body p-4">
    <div *ngIf="status === TokenStatus.Validating" class="text-center py-3">
      <div class="spinner-border text-primary"></div>
      <p class="mt-2 text-muted">Validating token...</p>
    </div>
    <div *ngIf="status === TokenStatus.Invalid" class="text-center">
      <div class="text-danger mb-3" style="font-size:3rem">✗</div>
      <h5>Invalid Token</h5>
      <p class="text-muted">This password reset link is invalid or has expired.</p>
      <a routerLink="/account/forgot-password" class="btn btn-outline-primary">Request New Link</a>
    </div>
    <div *ngIf="status === TokenStatus.Valid">
      <h5 class="card-title mb-4">Reset Password</h5>
      <form [formGroup]="form" (ngSubmit)="onSubmit()">
        <div class="mb-3">
          <label class="form-label">New Password</label>
          <input type="password" formControlName="password" class="form-control"
            [ngClass]="{'is-invalid': submitted && f['password'].errors}" />
          <div *ngIf="submitted && f['password'].errors" class="invalid-feedback">
            <div *ngIf="f['password'].errors['required']">Password is required</div>
            <div *ngIf="f['password'].errors['minlength']">At least 6 characters</div>
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label">Confirm New Password</label>
          <input type="password" formControlName="confirmPassword" class="form-control"
            [ngClass]="{'is-invalid': submitted && f['confirmPassword'].errors}" />
          <div *ngIf="submitted && f['confirmPassword'].errors" class="invalid-feedback">
            <div *ngIf="f['confirmPassword'].errors['required']">Confirm password is required</div>
            <div *ngIf="f['confirmPassword'].errors['mustMatch']">Passwords must match</div>
          </div>
        </div>
        <button [disabled]="loading" class="btn btn-primary w-100">
          <span *ngIf="loading" class="spinner-border spinner-border-sm me-1"></span>
          Reset Password
        </button>
      </form>
    </div>
  </div>
</div>
