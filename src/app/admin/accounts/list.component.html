<div class="card shadow-sm">
  <div class="card-header d-flex justify-content-between align-items-center">
    <h5 class="mb-0">Accounts</h5>
    <a routerLink="/admin/accounts/add" class="btn btn-sm btn-success">+ Add Account</a>
  </div>
  <div class="card-body p-0">
    <div class="table-responsive">
      <table class="table table-hover mb-0">
        <thead class="table-light">
          <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Role</th>
            <th class="text-end">Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let account of accounts">
            <td>{{ account.title }} {{ account.firstName }} {{ account.lastName }}</td>
            <td>{{ account.email }}</td>
            <td>
              <span class="badge" [ngClass]="account.role === 'Admin' ? 'bg-danger' : 'bg-secondary'">
                {{ account.role }}
              </span>
            </td>
            <td class="text-end">
              <a [routerLink]="['/admin/accounts/edit', account.id]" class="btn btn-sm btn-outline-primary me-1">Edit</a>
              <button (click)="deleteAccount(account.id)" class="btn btn-sm btn-outline-danger"
                [disabled]="isDeleting(account.id)">
                <span *ngIf="isDeleting(account.id)" class="spinner-border spinner-border-sm"></span>
                <span *ngIf="!isDeleting(account.id)">Delete</span>
              </button>
            </td>
          </tr>
          <tr *ngIf="!accounts.length">
            <td colspan="4" class="text-center text-muted py-4">No accounts found.</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
