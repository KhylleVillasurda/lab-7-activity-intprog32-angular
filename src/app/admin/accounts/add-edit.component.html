<div class="card shadow-sm">
  <div class="card-header">
    <h5 class="mb-0">{{ isAddMode ? 'Add Account' : 'Edit Account' }}</h5>
  </div>
  <div class="card-body">
    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="row g-3">
        <div class="col-md-2">
          <label class="form-label">Title</label>
          <select formControlName="title" class="form-select" [ngClass]="{'is-invalid': submitted && f['title'].errors}">
            <option value="">Select</option>
            <option>Mr</option><option>Mrs</option><option>Miss</option><option>Ms</option>
          </select>
          <div *ngIf="submitted && f['title'].errors" class="invalid-feedback">Required</div>
        </div>
        <div class="col-md-5">
          <label class="form-label">First Name</label>
          <input type="text" formControlName="firstName" class="form-control"
            [ngClass]="{'is-invalid': submitted && f['firstName'].errors}" />
          <div *ngIf="submitted && f['firstName'].errors" class="invalid-feedback">Required</div>
        </div>
        <div class="col-md-5">
          <label class="form-label">Last Name</label>
          <input type="text" formControlName="lastName" class="form-control"
            [ngClass]="{'is-invalid': submitted && f['lastName'].errors}" />
          <div *ngIf="submitted && f['lastName'].errors" class="invalid-feedback">Required</div>
        </div>
        <div class="col-md-6">
          <label class="form-label">Email</label>
          <input type="email" formControlName="email" class="form-control"
            [ngClass]="{'is-invalid': submitted && f['email'].errors}" />
          <div *ngIf="submitted && f['email'].errors" class="invalid-feedback">Valid email required</div>
        </div>
        <div class="col-md-6">
          <label class="form-label">Role</label>
          <select formControlName="role" class="form-select" [ngClass]="{'is-invalid': submitted && f['role'].errors}">
            <option value="">Select role</option>
            <option value="User">User</option>
            <option value="Admin">Admin</option>
          </select>
          <div *ngIf="submitted && f['role'].errors" class="invalid-feedback">Required</div>
        </div>
        <div class="col-md-6">
          <label class="form-label">Password <span *ngIf="!isAddMode" class="text-muted">(leave blank to keep current)</span></label>
          <input type="password" formControlName="password" class="form-control"
            [ngClass]="{'is-invalid': submitted && f['password'].errors}" />
          <div *ngIf="submitted && f['password'].errors" class="invalid-feedback">
            <div *ngIf="f['password'].errors['required']">Password is required</div>
            <div *ngIf="f['password'].errors['minlength']">At least 6 characters</div>
          </div>
        </div>
        <div class="col-md-6">
          <label class="form-label">Confirm Password</label>
          <input type="password" formControlName="confirmPassword" class="form-control"
            [ngClass]="{'is-invalid': submitted && f['confirmPassword'].errors}" />
          <div *ngIf="submitted && f['confirmPassword'].errors" class="invalid-feedback">
            <div *ngIf="f['confirmPassword'].errors['mustMatch']">Passwords must match</div>
          </div>
        </div>
      </div>
      <div class="mt-4 d-flex gap-2">
        <button [disabled]="loading" class="btn btn-primary">
          <span *ngIf="loading" class="spinner-border spinner-border-sm me-1"></span>
          Save
        </button>
        <a routerLink="/admin/accounts" class="btn btn-outline-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
